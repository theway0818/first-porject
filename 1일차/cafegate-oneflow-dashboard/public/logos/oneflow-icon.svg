<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="ONE FLOW app icon">
  <defs>
    <!-- 배경 그라디언트: 딥블루 → 퍼플 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="55%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- 심볼 내부 흰색 글로우 -->
    <linearGradient id="symbolWhite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C7D2FE" stop-opacity="0.85"/>
    </linearGradient>

    <!-- 보조 액센트 (시안 포인트) -->
    <linearGradient id="cyanAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>

    <!-- 내부 광택 -->
    <radialGradient id="sheen" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- 그림자 필터 -->
    <filter id="iconShadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4338CA" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 배경 라운드 사각형 (앱 아이콘 컨테이너) -->
  <rect
    x="2" y="2" width="96" height="96" rx="22" ry="22"
    fill="url(#bgGrad)"
    filter="url(#iconShadow)"
  />

  <!-- 광택 오버레이 -->
  <rect x="2" y="2" width="96" height="96" rx="22" ry="22" fill="url(#sheen)"/>

  <!-- ── "1" 형태 + 흐름 통합 심볼 ── -->

  <!-- "1"의 세로 획 (굵고 짧게, 중앙에서 약간 왼쪽) -->
  <rect x="42" y="24" width="7" height="36" rx="3.5" fill="url(#symbolWhite)" opacity="0.95"/>

  <!-- "1"의 상단 대각 획 (serif 느낌) -->
  <path
    d="M 33 30 C 36 27, 40 25, 42 24"
    fill="none"
    stroke="url(#symbolWhite)"
    stroke-width="5.5"
    stroke-linecap="round"
    opacity="0.9"
  />

  <!-- "1"의 베이스라인 (넓은 발판) -->
  <rect x="34" y="57" width="23" height="5" rx="2.5" fill="url(#symbolWhite)" opacity="0.9"/>

  <!-- ── 흐름(Flow) 라인 ── -->
  <!-- 베이스에서 오른쪽으로 흘러나가는 곡선 흐름 -->
  <path
    d="M 57 59.5 C 62 59.5, 64 64, 70 67 C 76 70, 79 68, 81 65"
    fill="none"
    stroke="url(#cyanAccent)"
    stroke-width="3.5"
    stroke-linecap="round"
    opacity="0.9"
  />

  <!-- 흐름 끝 화살표 (작은 삼각형) -->
  <path
    d="M 79 61 L 84 65 L 79 69"
    fill="none"
    stroke="url(#cyanAccent)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />

  <!-- 흐름 시작 연결 도트 (베이스에서 흘러나오는 포인트) -->
  <circle cx="57" cy="59.5" r="3.5" fill="#38BDF8" opacity="0.85"/>

  <!-- 상단 좌측 소형 흐름 입력 라인 (다른 소스에서 합류) -->
  <path
    d="M 20 38 C 26 38, 30 38, 42 40"
    fill="none"
    stroke="url(#symbolWhite)"
    stroke-width="2.2"
    stroke-linecap="round"
    opacity="0.35"
  />

  <!-- 하단 좌측 소형 흐름 입력 라인 -->
  <path
    d="M 20 56 C 26 56, 30 56, 34 57"
    fill="none"
    stroke="url(#symbolWhite)"
    stroke-width="2.2"
    stroke-linecap="round"
    opacity="0.35"
  />

  <!-- 좌측 소스 도트 1 -->
  <circle cx="20" cy="38" r="2.5" fill="white" opacity="0.3"/>

  <!-- 좌측 소스 도트 2 -->
  <circle cx="20" cy="56" r="2.5" fill="white" opacity="0.3"/>
</svg>
