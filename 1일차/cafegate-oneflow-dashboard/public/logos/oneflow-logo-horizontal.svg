<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="ONE FLOW logo">
  <defs>
    <!-- 심볼 그라디언트: 블루 → 퍼플 -->
    <linearGradient id="symbolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- 텍스트 강조 그라디언트 -->
    <linearGradient id="textAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- 글로우 필터 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── 심볼 영역 (좌측 40×80) ── -->
  <!-- 배경 원형 필 (선택적 subtle) -->
  <circle cx="40" cy="40" r="28" fill="url(#symbolGrad)" opacity="0.08"/>

  <!-- 흐름선 1: 상단 → 중앙 합류 -->
  <path
    d="M 16 22 C 22 22, 26 32, 32 36"
    fill="none"
    stroke="url(#symbolGrad)"
    stroke-width="2.8"
    stroke-linecap="round"
    opacity="0.6"
    filter="url(#glow)"
  />

  <!-- 흐름선 2: 하단 → 중앙 합류 -->
  <path
    d="M 16 58 C 22 58, 26 48, 32 44"
    fill="none"
    stroke="url(#symbolGrad)"
    stroke-width="2.8"
    stroke-linecap="round"
    opacity="0.6"
    filter="url(#glow)"
  />

  <!-- 중앙 합류 → 오른쪽 방출 메인 라인 -->
  <path
    d="M 32 36 C 34 38, 34 42, 32 44 C 38 42, 50 40, 62 40"
    fill="none"
    stroke="url(#symbolGrad)"
    stroke-width="3.2"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- 방향 화살표 끝점 (원형 도트) -->
  <circle cx="62" cy="40" r="3.5" fill="url(#symbolGrad)" filter="url(#glow)"/>

  <!-- 중심 노드 (합류 포인트) -->
  <circle cx="32" cy="40" r="4.5" fill="url(#symbolGrad)" opacity="0.9"/>

  <!-- 상단 소스 노드 -->
  <circle cx="16" cy="22" r="2.8" fill="#2563EB" opacity="0.7"/>

  <!-- 하단 소스 노드 -->
  <circle cx="16" cy="58" r="2.8" fill="#7C3AED" opacity="0.7"/>

  <!-- ── 워드마크 영역 (우측) ── -->
  <!-- "ONE" 텍스트 -->
  <text
    x="82"
    y="35"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="3"
    fill="#1E293B"
  >ONE</text>

  <!-- 구분선 (얇은 그라디언트 라인) -->
  <rect x="82" y="40" width="88" height="1.5" fill="url(#textAccent)" rx="1" opacity="0.4"/>

  <!-- "FLOW" 텍스트 -->
  <text
    x="82"
    y="60"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="300"
    letter-spacing="5.5"
    fill="url(#textAccent)"
  >FLOW</text>

  <!-- 우측 캐치프레이즈 (선택적, 매우 작게) -->
  <text
    x="180"
    y="60"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="7.5"
    font-weight="400"
    letter-spacing="1.5"
    fill="#94A3B8"
  >COLLABORATION</text>
</svg>
